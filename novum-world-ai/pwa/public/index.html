<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Novum World - Upload Terminal</title>
    <link rel="stylesheet" href="style.css">
    <!-- PWA Manifest & Icons -->
    <meta name="theme-color" content="#0d0d0d">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>

<body>
    <div class="terminal-container">
        <header>
            <h1 class="glitch-text" data-text="NOVUM_LINK">NOVUM_LINK</h1>
            <p class="subtitle">Secure Video Uplink to Cloudflare R2</p>
        </header>

        <main>
            <form id="uploadForm">
                <div class="input-group">
                    <label>MASTER PASSWORD</label>
                    <input type="password" id="password" required placeholder="••••••••"
                        autocomplete="current-password">
                </div>

                <div class="input-group mode-selector">
                    <label>MODO DE OPERACIÓN</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="uploadType" value="single" checked>
                            <span class="radio-text">A. LANZAMIENTO DIRECTO (1 Video)</span>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="uploadType" value="batch">
                            <span class="radio-text">B. FÁBRICA DE MONTAJE (Múltiples/Carpeta)</span>
                        </label>
                    </div>
                </div>

                <div class="input-group">
                    <label>TÍTULO DEL VIDEO (SEO)</label>
                    <input type="text" id="videoTitle" required placeholder="Ej: La verdad oculta de la IA #Tech #Novum"
                        maxlength="150">
                </div>

                <div class="input-group">
                    <label>DESCRIPCIÓN DEL VIDEO</label>
                    <textarea id="videoDescription" rows="4"
                        placeholder="Describe brevemente el video y añádele el toque cibernético..."></textarea>
                </div>

                <div class="input-group">
                    <label>HASHTAGS (separados por coma)</label>
                    <input type="text" id="videoHashtags" placeholder="Ej: shorts, tech, IA, novum">
                </div>

                <div class="input-group">
                    <label>PRIVACIDAD</label>
                    <select id="videoPrivacy" class="cyber-select">
                        <option value="private">Privado</option>
                        <option value="unlisted">Oculto</option>
                        <option value="public">Público</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>REDES DE DESTINO</label>
                    <div class="checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="destYoutube" value="youtube" checked>
                            <span class="checkbox-text">YouTube Shorts</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="destInstagram" value="instagram" checked>
                            <span class="checkbox-text">Instagram Reels</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="destTiktok" value="tiktok" checked>
                            <span class="checkbox-text">TikTok</span>
                        </label>
                    </div>
                </div>

                <div class="input-group file-upload-wrapper">
                    <label>ARCHIVOS DE VIDEO</label>
                    <div class="file-drop-area" id="dropZ">
                        <span class="file-msg">Toca o arrastra tus videos aquí</span>
                        <input class="file-input" type="file" id="videoFile" accept="video/*" required>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="cyber-button">
                    INICIAR SECUENCIA_UPLOAD
                </button>
            </form>

            <div id="statusConsole" class="terminal-console hidden">
                <p>> System ready...</p>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>

</html>
