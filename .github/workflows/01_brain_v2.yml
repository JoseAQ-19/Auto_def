name: "Fase 1: El Cerebro (GSC & LLM Bot)"

on:
  schedule:
    - cron: '0 8 * * *' # Ejecuta todos los días a las 08:00 UTC
  workflow_dispatch: # Permite ejecución manual

jobs:
  run_brain:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        working-directory: ./novum-world-ai
        run: |
          pip install -r requirements.txt
          
      - name: Decode GSC Credentials
        working-directory: ./novum-world-ai
        env:
          GOOGLE_CREDS: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: |
          # Intenta descodificar base64 quitando saltos de línea primero
          echo "$GOOGLE_CREDS" | tr -d '\n\r ' | base64 -d > credentials.json || echo "$GOOGLE_CREDS" > credentials.json
          
      - name: Execute Phase 1
        working-directory: ./novum-world-ai
        env:
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          GSC_CREDENTIALS_PATH: credentials.json
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          HF_TOKEN_CEREBRO: ${{ secrets.HF_TOKEN_CEREBRO }}
          TOKEN_TELEGRAM: ${{ secrets.TOKEN_TELEGRAM }}
          TELEGRAM_USER_ID: ${{ secrets.TELEGRAM_USER_ID }}
        run: |
          export PYTHONPATH=$(pwd)
          python -m src.main_phase1
