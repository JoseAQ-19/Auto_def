name: "1. The Brain (Content-Creator)"

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  run-brain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Setup Node.js (Requerido para GSC MCP)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar FFmpeg (Sistema)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Instalar dependencias
        working-directory: ./novum-world-ai
        run: pip install -r requirements.txt

      - name: Ejecutar FASE 1 - The Brain
        working-directory: ./novum-world-ai
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVEN_LABS_API_KEY }}
          HF_TOKEN_CEREBRO: ${{ secrets.HF_TOKEN_CEREBRO }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
        run: python src/phase1_brain.py

      - name: Subir Artifacts de la Idea
        uses: actions/upload-artifact@v4
        with:
          name: brain-artifacts
          path: |
            novum-world-ai/shooting_plan.json
            novum-world-ai/*.wav
            novum-world-ai/*.mp3
          retention-days: 1
