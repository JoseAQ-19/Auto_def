name: "Distribución Multicanal (El Músculo)"

on:
  repository_dispatch:
    types: [video_upload_ready] # Se dispara automáticamente por la PWA (Phase 3)

jobs:
  distribute_and_clean:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        working-directory: ./novum-world-ai
        run: |
          pip install -r requirements.txt
          pip install boto3 # Obligatorio para borrar el MP4 en Cloudflare R2
          
      - name: Asumir Control - Fase 4 (Composio SDK Distribución)
        working-directory: ./novum-world-ai
        env:
          # Payload Dinámico desde el webhook de la PWA FrontEnd
          VIDEO_TITLE: ${{ github.event.client_payload.title }}
          VIDEO_URL: ${{ github.event.client_payload.video_url }}
          FILE_KEY: ${{ github.event.client_payload.file_key }}
          VIDEO_DESCRIPTION: ${{ github.event.client_payload.description }}
          VIDEO_HASHTAGS: ${{ github.event.client_payload.hashtags }}
          VIDEO_PRIVACY: ${{ github.event.client_payload.privacy }}
          DEST_YOUTUBE: ${{ github.event.client_payload.dest_youtube }}
          DEST_INSTAGRAM: ${{ github.event.client_payload.dest_instagram }}
          DEST_TIKTOK: ${{ github.event.client_payload.dest_tiktok }}
          
          # Entorno Estático de Seguridad (Secretos)
          COMPOSIO_API_KEY: ${{ secrets.COMPOSIO_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          TOKEN_TELEGRAM: ${{ secrets.TOKEN_TELEGRAM }}
          TELEGRAM_USER_ID: ${{ secrets.TELEGRAM_USER_ID }}
        run: |
          export PYTHONPATH=$(pwd)
          python -m src.main_phase4
