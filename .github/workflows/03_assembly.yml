name: "3. The Assembly (Final Cut)"

on:
  workflow_run:
    workflows: ["2. The Sets (Production)"]
    types:
      - completed
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  run-assembly:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar FFmpeg (Sistema)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Instalar dependencias
        working-directory: ./novum-world-ai
        run: pip install -r requirements.txt

      - name: Descargar Artifacts de Grabación
        uses: dawidd6/action-download-artifact@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: 02_sets.yml
          name: set-artifacts
          path: .
          search_artifacts: true
          if_no_artifact_found: warn

      - name: Ejecutar FASE 3 - The Assembly
        working-directory: ./novum-world-ai
        run: python src/phase3_assembly.py

      - name: Subir Video Final
        uses: actions/upload-artifact@v4
        with:
          name: daily-video
          path: novum-world-ai/final_video.mp4
          retention-days: 7
